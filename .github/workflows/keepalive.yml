name: Supabase Keepalive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to keep the project active
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_TABLE: ${{ secrets.SUPABASE_TABLE || 'keepalive' }}
        run: |
          set -e
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/$SUPABASE_TABLE?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP status: $status"
          cat /tmp/response.json

          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase ping failed with status $status"
            exit 1
          fi
